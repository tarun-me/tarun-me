<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Dino Run</title>
    <style>
        /* Removes default browser margins and scrollbars */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
            background-color: #222; /* Fallback dark background */
        }
        
        /* Makes the iframe stretch perfectly across the whole screen */
        iframe { 
            position: absolute; 
            top: 0;
            left: 0;
            width: 100%; 
            height: 100%; 
            border: none;
            z-index: 999; 
        }
    </style>
</head>
<body>

    <!-- The colored Dino game embed -->
    <iframe src="https://chromedino.com/color/" loading="lazy"></iframe>

</body>
</html>
